<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Hub">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" id="tmeta" content="#0e1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<title>Cheema Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1a2e; --surf:#162032; --surf2:#1b2a40; --surf3:#213252;
  --brd:#2b3f60; --text:#e2eeff; --sub:#6d88ae; --muted:#3d5575;
  --ease:cubic-bezier(.4,0,.2,1);
  --shadow:0 8px 28px rgba(0,0,0,.38);
}
body.light{
  --bg:#edf3ff; --surf:#ffffff; --surf2:#e4edfb; --surf3:#d4e4f7;
  --brd:#bfcfe8; --text:#0e1a2e; --sub:#4a6280; --muted:#8aa4c0;
  --shadow:0 4px 18px rgba(14,26,46,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none;transition:background .3s var(--ease),color .3s var(--ease)}
button,input,textarea,select{font-family:inherit;color:inherit}
input::placeholder,textarea::placeholder{color:var(--muted)}
::-webkit-scrollbar{display:none}
.screen{display:none;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* ── ANIMATIONS ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes itemIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.35)}60%{box-shadow:0 0 0 5px transparent}}

/* ── LOADING ── */
#loading{align-items:center;justify-content:center}
.spinner{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;border-top-color:#60a5fa;animation:spin .65s linear infinite}

/* ── LOGIN ── */
#login{align-items:center;justify-content:center;padding:32px 20px;position:relative;overflow:hidden}
.glow-a{position:fixed;top:-15%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(96,165,250,.055) 0%,transparent 70%);pointer-events:none}
.glow-b{position:fixed;bottom:-10%;right:-5%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(129,140,248,.055) 0%,transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--surf);border-radius:24px;border:1px solid var(--brd);box-shadow:var(--shadow);padding:30px 22px;width:100%;max-width:320px;animation:scaleIn .35s var(--ease) both}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.brand-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(145deg,#60a5fa,#818cf8);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(96,165,250,.22)}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.5px}
.brand-sub{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}
.divider{height:1px;background:var(--brd);margin:0 0 20px}
.sec-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mbtn{display:flex;flex-direction:column;align-items:center;gap:9px;background:var(--surf2);border:1.5px solid var(--brd);border-radius:18px;padding:18px 10px 14px;cursor:pointer;transition:border-color .18s,background .18s,transform .12s var(--ease),box-shadow .2s}
.mbtn:active{transform:scale(.94)}
.mname{font-size:12px;font-weight:600}
.avatar{border-radius:30%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;user-select:none;transition:transform .2s var(--ease)}

/* ── INSTALL BANNER ── */
.install-banner{margin:14px 22px 0;background:var(--surf2);border:1px solid var(--brd);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px;animation:fadeUp .28s var(--ease) both}
.install-banner svg{flex-shrink:0;color:var(--sub)}
.ibtext{flex:1;min-width:0}
.ibtext strong{font-size:13px;font-weight:700;display:block;margin-bottom:2px}
.ibtext span{font-size:11px;color:var(--sub);line-height:1.4}
.ibbtn{padding:6px 12px;border-radius:9px;border:none;background:#60a5fa;color:white;font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s}
.ibbtn:active{opacity:.8}
.ibdis{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 2px;flex-shrink:0}

/* ── HEADER ── */
header{border-bottom:2.5px solid var(--brd);padding:12px 15px 0;position:sticky;top:0;z-index:100;transition:border-color .3s}
body:not(.light) header{background:rgba(14,26,46,.93);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
body.light header{background:rgba(237,243,255,.94);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.h-left{display:flex;align-items:center;gap:9px;min-width:0}
.h-icon{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s var(--ease)}
.h-lbl{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase}
.h-title{font-size:14px;font-weight:800;letter-spacing:-.4px}
.h-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.status-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surf2);border-radius:20px;border:1px solid var(--brd)}
.sdot{width:5px;height:5px;border-radius:50%;transition:background .4s;animation:pulseGreen 4s infinite}
.stxt{font-size:9px;font-weight:600;color:var(--sub)}
.hbtn{width:30px;height:30px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .18s var(--ease),background .3s;flex-shrink:0}
.hbtn:active{transform:scale(.82)}
.m-chip{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer;transition:opacity .15s,background .3s;flex-shrink:0}
.m-chip:active{opacity:.7}
.chip-name{font-size:11px;font-weight:600;color:var(--sub);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}

/* ── TABS ── */
.tabs-row{display:flex;align-items:flex-end;overflow:hidden}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 2px 11px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:-.1px;transition:color .25s var(--ease),background .25s var(--ease);border-bottom:3px solid transparent;margin-bottom:-2.5px;white-space:nowrap;min-width:0}
.tab-cnt{font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;transition:all .25s;flex-shrink:0}
.sort-wrap{padding:0 0 11px 8px;flex-shrink:0}
.sort-sel{padding:4px 9px;border-radius:8px;background:var(--surf2);font-size:10px;font-weight:700;outline:none;cursor:pointer;border-width:1.5px;border-style:solid;appearance:none;-webkit-appearance:none;transition:background .3s}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;transition:opacity .22s var(--ease),transform .22s var(--ease)}
.accent-strip{height:3px;transition:background .28s}

/* ── INPUT CARD ── */
.input-card{margin:13px 13px 0;background:var(--surf);border-radius:16px;overflow:hidden;border:1px solid var(--brd);box-shadow:var(--shadow);transition:background .3s,border-color .3s;animation:fadeUp .28s var(--ease) both}
.input-row{display:flex;align-items:center;border-bottom:1px solid var(--brd)}
.main-input{flex:1;min-width:0;padding:13px 14px;border:none;background:transparent;font-size:15px;font-weight:500;outline:none;color:var(--text)}
.add-btn{margin:6px;padding:8px 16px;border-radius:10px;border:none;font-weight:700;font-size:13px;color:white;transition:transform .14s var(--ease),opacity .14s,background .25s;white-space:nowrap;flex-shrink:0;cursor:pointer}
.add-btn:active{transform:scale(.9);opacity:.85}
.urg-row{display:flex;align-items:center;gap:5px;padding:7px 11px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.urg-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;flex-shrink:0;margin-right:2px}
.urg-btn{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-weight:600;font-size:11px;flex-shrink:0;transition:all .16s var(--ease);cursor:pointer;border-width:1.5px;border-style:solid;white-space:nowrap}
.urg-btn:active{transform:scale(.9)}
.udot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .16s}

/* ── FILTERS ── */
.filter-row{display:flex;align-items:center;gap:5px;padding:11px 13px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.f-btn{display:flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;flex-shrink:0;font-weight:600;font-size:11px;cursor:pointer;transition:all .16s var(--ease);white-space:nowrap;border-width:1.5px;border-style:solid}
.f-btn:active{transform:scale(.92)}
.count-line{padding:11px 15px 3px;font-size:11px;color:var(--muted);font-weight:500}

/* ── ITEMS ── */
.list-wrap{padding:3px 13px 0}
.swipe-wrap{position:relative;margin-bottom:7px;border-radius:14px;overflow:hidden}
.swipe-wrap:nth-child(1) .item{animation:itemIn .2s var(--ease) both}
.swipe-wrap:nth-child(2) .item{animation:itemIn .2s .04s var(--ease) both}
.swipe-wrap:nth-child(3) .item{animation:itemIn .2s .08s var(--ease) both}
.swipe-wrap:nth-child(4) .item{animation:itemIn .2s .11s var(--ease) both}
.swipe-wrap:nth-child(n+5) .item{animation:itemIn .2s .14s var(--ease) both}
.swipe-bg{position:absolute;inset:0;background:#ef4444;display:flex;align-items:center;justify-content:flex-end;padding-right:18px;border-radius:14px;opacity:0}
.swipe-bg-txt{color:white;font-size:14px;font-weight:700}
.item{display:flex;align-items:center;gap:11px;background:var(--surf);border-radius:14px;padding:12px 13px;border:1px solid var(--brd);border-left-width:3px;position:relative;z-index:1;will-change:transform;touch-action:pan-y;transition:background .3s,border-color .3s}
.item.done{opacity:.32}
.ichk{width:22px;height:22px;border-radius:7px;border:1.5px solid;background:transparent;cursor:pointer;flex-shrink:0;padding:0;transition:all .18s var(--ease);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.ichk:active{transform:scale(.82)}
.ibody{flex:1;min-width:0}
.itext{font-size:14px;font-weight:500;color:var(--text);word-break:break-word;overflow-wrap:anywhere;line-height:1.4}
.itext.struck{text-decoration:line-through;color:var(--sub)}
.imeta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.iname{font-size:10px;font-weight:700;flex-shrink:0}
.iurg{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;cursor:pointer;flex-shrink:0;transition:opacity .14s}
.iurg:active{opacity:.6}
.itime{font-size:10px;color:var(--muted);font-weight:500}
.del-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:3px 4px;line-height:1;transition:color .14s,transform .14s;flex-shrink:0;opacity:.45}
.del-btn:active{color:#ef4444;opacity:1;transform:scale(1.2)}

/* ── DONE ── */
.done-sec{padding:0 13px}
.done-sep{height:1px;background:var(--brd);margin:10px 0 0}
.done-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px}
.done-ttl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.clear-btn{font-size:11px;font-weight:600;color:var(--sub);background:var(--surf2);border:1px solid var(--brd);cursor:pointer;padding:4px 9px;border-radius:7px;transition:opacity .14s,background .3s}
.clear-btn:active{opacity:.7}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px 28px;animation:fadeUp .3s var(--ease) both}
.empty-icon{width:48px;height:48px;border-radius:14px;background:var(--surf2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;transition:background .3s}
.empty-text{font-size:14px;font-weight:600;color:var(--sub)}
.empty-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── MESSAGES ── */
.msg-compose{margin:13px 13px 0;background:var(--surf);border-radius:16px;overflow:hidden;border:1px solid var(--brd);border-top-width:2.5px;box-shadow:var(--shadow);transition:background .3s,border-color .3s;animation:fadeUp .28s var(--ease) both}
.msg-ta{width:100%;padding:13px 14px;border:none;background:transparent;font-size:14px;font-weight:500;outline:none;color:var(--text);resize:none;display:block;line-height:1.55;overflow-wrap:break-word;word-break:break-word}
.msg-ft{display:flex;align-items:center;justify-content:space-between;padding:7px 11px 10px;border-top:1px solid var(--brd);gap:8px}
.msg-as{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);font-weight:500;min-width:0;overflow:hidden}
.post-btn{padding:7px 16px;border-radius:10px;border:none;font-weight:700;font-size:12px;color:white;cursor:pointer;transition:transform .14s var(--ease),opacity .14s,background .25s;white-space:nowrap;flex-shrink:0}
.post-btn:active{transform:scale(.9);opacity:.85}
.msg-feed{padding:13px 13px 0}
.nwrap{margin-bottom:18px;display:flex;flex-direction:column;animation:itemIn .2s var(--ease) both}
.nwrap.mine{align-items:flex-end}.nwrap.theirs{align-items:flex-start}
.nhdr{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.nauthor{font-size:12px;font-weight:800;letter-spacing:-.2px}
.ntime{font-size:10px;color:var(--muted);font-weight:500}
.nbubble{max-width:84%;padding:10px 13px;border:1px solid;overflow-wrap:break-word;word-break:break-word;transition:background .3s,border-color .3s}
.nbubble.mine{border-radius:16px 4px 16px 16px}
.nbubble.theirs{border-radius:4px 16px 16px 16px;border-left-width:3px}
.ntext{font-size:14px;font-weight:500;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word}
.rbar{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap;position:relative}
.rbtn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;background:var(--surf2);border:1px solid var(--brd);cursor:pointer;font-size:13px;transition:all .16s var(--ease)}
.rbtn:active{transform:scale(.88)}
.rcnt{font-size:10px;font-weight:700;color:var(--sub)}
.radd{padding:3px 9px;border-radius:12px;background:var(--surf2);border:1px solid var(--brd);cursor:pointer;font-size:11px;color:var(--muted);font-weight:600;transition:all .16s var(--ease)}
.radd:active{transform:scale(.88)}
.epicker{display:flex;gap:3px;padding:5px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;box-shadow:0 10px 32px rgba(0,0,0,.42);position:absolute;bottom:calc(100% + 7px);left:0;z-index:50;animation:fadeUp .14s var(--ease) both}
.eopt{font-size:18px;padding:4px 5px;border-radius:8px;cursor:pointer;background:none;border:none;transition:transform .12s var(--ease)}
.eopt:active{transform:scale(.8)}
.ndel{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:4px;font-weight:500;padding:2px 4px;transition:color .14s}
.ndel:active{color:#ef4444}

/* ── NOTIF BANNER ── */
.notif-bar{margin:12px 13px 0;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:9px;animation:fadeUp .22s var(--ease) both}
.notif-bar-txt{font-size:12px;color:var(--sub);font-weight:500;flex:1;min-width:0;line-height:1.4}
.notif-bar-act{padding:5px 11px;border-radius:8px;background:#60a5fa1a;border:1px solid #60a5fa44;color:#60a5fa;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .14s}
.notif-bar-act:active{background:#60a5fa2e}
.notif-bar-dis{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0}

/* ── INSTALL SHEET ── */
.sheet-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;padding:16px;animation:fadeUp .18s var(--ease) both}
.sheet{background:var(--surf);border-radius:22px;border:1px solid var(--brd);padding:24px 22px 32px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.5);animation:fadeUp .25s var(--ease) both}
.sheet h3{font-size:16px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.sheet p{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:16px}
.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.step{display:flex;align-items:flex-start;gap:11px;background:var(--surf2);border-radius:12px;padding:11px 13px;border:1px solid var(--brd)}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--surf3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--sub);margin-top:1px}
.step-txt{font-size:12px;color:var(--sub);line-height:1.5;flex:1;min-width:0;overflow-wrap:anywhere}
.step-txt b{color:var(--text);font-weight:700}
.sheet-btns{display:flex;gap:8px}
.sheet-primary{flex:1;padding:11px;border-radius:12px;border:none;font-weight:700;font-size:13px;color:white;background:#60a5fa;cursor:pointer;transition:opacity .14s}
.sheet-primary:active{opacity:.8}
.sheet-sec{flex:1;padding:11px;border-radius:12px;border:1px solid var(--brd);font-weight:600;font-size:13px;color:var(--sub);background:var(--surf2);cursor:pointer;transition:opacity .14s}
.sheet-sec:active{opacity:.7}

/* ── FOOTER ── */
.footer{display:flex;align-items:center;justify-content:center;gap:6px;padding:22px 0 14px}
.fdot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulseGreen 4s 1s infinite}
.ftxt{font-size:10px;color:var(--muted);font-weight:500}
.fver{font-size:9px;color:var(--muted);opacity:.5;margin-left:3px;font-weight:600}
</style>
</head>
<body>

<div id="loading" class="screen active"><div class="spinner"></div></div>

<div id="login" class="screen">
  <div class="glow-a"></div><div class="glow-b"></div>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="brand-name">Cheema Family</div><div class="brand-sub">Your shared family hub</div></div>
    </div>
    <div class="divider"></div>
    <div class="sec-lbl">Who are you?</div>
    <div class="member-grid" id="mgrid"></div>
  </div>
  <div id="install-login-banner"></div>
</div>

<div id="app" class="screen">
  <header id="mhdr">
    <div class="h-top">
      <div class="h-left">
        <div class="h-icon" id="hicon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div><div class="h-lbl">Cheema Family</div><div class="h-title">Family Hub</div></div>
      </div>
      <div class="h-right">

function b64ToU8(b64){
  const p='='.repeat((4-b64.length%4)%4);
  const r=atob((b64+p).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...r].map(c=>c.charCodeAt(0)));
}

async function initSW(){

}

async function subscribePush(){
  if(!swReg||!('PushManager' in window))return false;
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted')return false;

    let sub=await swReg.pushManager.getSubscription();
    if(!sub){
      sub=await swReg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:b64ToU8(VAPID_PUB)
      });
    }
    // Store subscription in Firebase
    const key=btoa(sub.endpoint).slice(-22).replace(/[^a-zA-Z0-9]/g,'');
    await fetch(`https://cheema-79800-default-rtdb.europe-west1.firebasedatabase.app/subscriptions/${key}.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(sub.toJSON())

}

// ── WEB PUSH SUBSCRIPTION ──
const VAPID_PUB='BHeqNiEDdtZG2JXW-xhJxz8ARfkIPkyfgfQjt5rjf5a4I0nQJZYRqkPGXs-MnDkT6nc3W2lPH9IFlhGMzR4OJ-0';
const FB_SUBS='https://cheema-79800-default-rtdb.europe-west1.firebasedatabase.app/subscriptions';

function b64ToArr(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

async function initPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
  try{
    const reg=await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    // If already subscribed, just refresh the stored sub
    const existing=await reg.pushManager.getSubscription();
    if(existing){await storeSub(existing);return;}
    // If permission already granted, subscribe silently
    if(Notification.permission==='granted'){
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToArr(VAPID_PUB)});
      await storeSub(sub);
    }
    // Otherwise wait for user to tap the enable button
  }catch(e){console.log('Push init:',e.message);}
}

// Queue a notification — batches within 45s window
function queueNotif(type, who, text){
  notifBatch.push({type, who, text, ts: Date.now()});
  if(notifTimer) clearTimeout(notifTimer);
  notifTimer = setTimeout(flushNotifs, 45000);
}

function flushNotifs(){
  notifTimer = null;
  if(!notifBatch.length) return;
  const batch = [...notifBatch];
  notifBatch = [];

  // Group by type
  const shop = batch.filter(x=>x.type==='shop');
  const todo = batch.filter(x=>x.type==='todo');
  const msgs = batch.filter(x=>x.type==='msg');

  const lines = [];
  if(shop.length === 1)
    lines.push(`🛒 <b>${shop[0].who}</b> added to Shopping: <i>${shop[0].text}</i>`);
  else if(shop.length > 1)
    lines.push(`🛒 <b>${shop[0].who}</b> added ${shop.length} items to Shopping`);

  if(todo.length === 1)
    lines.push(`✅ <b>${todo[0].who}</b> added to To-Do: <i>${todo[0].text}</i>`);
  else if(todo.length > 1)
    lines.push(`✅ <b>${todo[0].who}</b> added ${todo.length} tasks to To-Do`);

  if(msgs.length === 1)
    lines.push(`💬 <b>${msgs[0].who}</b>: <i>${msgs[0].text}</i>`);
  else if(msgs.length > 1)
    lines.push(`💬 <b>${msgs[0].who}</b> sent ${msgs.length} messages`);

  if(lines.length) sendTelegram(lines.join('\n'));
}

async function fetchChatId(){
  const token = document.getElementById('tg-token')?.value.trim();
  const msg = document.getElementById('tg-msg');
  if(!token){if(msg)msg.textContent='Enter bot token first';return;}
  if(msg)msg.textContent='Fetching…';
  try{
    const r = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
    const d = await r.json();
    if(!d.ok){if(msg)msg.textContent='Invalid token — check and try again';return;}
    const upd = d.result;
    if(!upd || !upd.length){
      if(msg)msg.textContent='No messages found — send a message in the group first, then try again';
      return;
    }
    // Find a group chat
    let chatId = null;
    for(const u of upd){
      const chat = u.message?.chat || u.channel_post?.chat;
      if(chat && (chat.type==='group'||chat.type==='supergroup')){chatId=chat.id;break;}
    }
    if(!chatId){
      // Fall back to any chat
      const any = upd[upd.length-1];
      chatId = any.message?.chat?.id || any.channel_post?.chat?.id;
    }
    if(chatId){
      document.getElementById('tg-chatid').value = chatId;
      if(msg)msg.style.color='#22c55e',msg.textContent='✓ Chat ID found: '+chatId;
    } else {
      if(msg)msg.textContent='Could not detect chat — send a message in the group then retry';
    }
  }catch(e){if(msg)msg.textContent='Error: '+e.message;}
}

async function saveTgSetup(){
  const token = document.getElementById('tg-token')?.value.trim();
  const chatId = document.getElementById('tg-chatid')?.value.trim();
  const msg = document.getElementById('tg-msg');
  if(!token||!chatId){if(msg)msg.textContent='Both fields required';return;}
  if(msg)msg.textContent='Saving…';
  const ok = await saveTgCfg(token, chatId);
  if(ok){
    await sendTelegram('✅ Cheema Family Hub notifications are now active!');
    document.getElementById('tg-sheet')?.remove();
  } else {
    if(msg)msg.textContent='Save failed — check your connection';
  }
}

    const c=document.getElementById('content');
    c.style.transition='none';c.style.opacity='0';c.style.transform='translateY(14px)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      c.style.transition='opacity .3s ease,transform .3s ease';c.style.opacity='1';c.style.transform='none';
    }));

    // Request notification permission if we're in standalone mode (PWA)
    if(isStandalone()&&'Notification' in window&&Notification.permission==='default'){
      setTimeout(async()=>{
        const ok=await subscribePush();
        if(ok)renderContent(); // refresh to hide notif bar
      },1500);
    }
  },220);
}

// ── TABS ──
function renderTabs(){
  const acc=TABS[tabIdx].accent;
  document.getElementById('mhdr').style.borderBottomColor=acc;
  const wrap=document.getElementById('tabs');
  const sc=state.shop.filter(x=>!x.done).length,tc=state.todo.filter(x=>!x.done).length;
  const sort=tabIdx===0?shopSort:todoSort;
  let html=TABS.map((t,i)=>{
    const active=tabIdx===i,cnt=i===0?sc:i===1?tc:0;
    return`<button class="tab-btn" onclick="setTab(${i})"
      style="color:${active?t.accent:'var(--muted)'};border-bottom-color:${active?t.accent:'transparent'};${active?`background:${t.accent}0e`:''}">
      ${esc(t.label)}
      ${cnt>0?`<span class="tab-cnt" style="background:${active?t.accent+'25':'var(--surf2)'};color:${active?t.accent:'var(--muted)'};border:1px solid ${active?t.accent+'44':'var(--brd)'}">${cnt}</span>`:''}
    </button>`;
  }).join('');
  if(tabIdx<2)html+=`<div class="sort-wrap"><select class="sort-sel" style="color:${acc};border-color:${acc}44" onchange="setSort(this.value)">${SORTS.map(o=>`<option value="${o.key}"${sort===o.key?' selected':''}>${o.label}</option>`).join('')}</select></div>`;
  wrap.innerHTML=html;
}

async function setTab(i){
  if(transitioning||i===tabIdx)return;
  transitioning=true;
  const dir=i>tabIdx?1:-1;
  const c=document.getElementById('content');
  c.style.transition='opacity .2s ease,transform .2s ease';
  c.style.opacity='0';c.style.transform=`translateX(${dir*24}px)`;
  await sleep(210);
  tabIdx=i;renderTabs();renderContent();
  c.style.transition='none';c.style.opacity='0';c.style.transform=`translateX(${-dir*24}px)`;
  c.offsetHeight;
  c.style.transition='opacity .28s ease,transform .28s ease';
  c.style.opacity='1';c.style.transform='none';
  setTimeout(()=>{transitioning=false;},300);
}
function setSort(v){if(tabIdx===0)shopSort=v;else todoSort=v;renderContent();}

// ── NOTIF BAR ──
function notifBar(){
  if(!('Notification' in window))return'';
  if(notifDismissed)return'';
  if(Notification.permission==='granted')return''; // already set up
  if(!isStandalone()){
    // Not installed yet — prompt install first
    return`<div class="notif-bar">
      <span class="notif-bar-txt">📲 Install the app first to enable notifications</span>
      <button class="notif-bar-act" onclick="${isIOS()?'showIOSSheet()':'triggerInstall()'}">Install</button>
      <button class="notif-bar-dis" onclick="notifDismissed=true;renderContent()">✕</button>
    </div>`;
  }
  // Installed but not granted
  return`<div class="notif-bar">
    <span class="notif-bar-txt">🔔 Enable notifications to know when the family adds something</span>
    <button class="notif-bar-act" onclick="enableNotifs()">Enable</button>
    <button class="notif-bar-dis" onclick="notifDismissed=true;renderContent()">✕</button>
  </div>`;
}
async function enableNotifs(){
  const ok=await subscribePush();
  notifDismissed=true;
  renderContent();
  if(ok){
    // Test notification
    if(swReg)swReg.showNotification('Notifications enabled ✓',{body:'You\'ll get notified when the family adds something',icon:'/icon-192.png'});
  }
}

// ── CONTENT ──
function renderContent(){
  const c=document.getElementById('content'),acc=TABS[tabIdx].accent;
  if(tabIdx===2){c.innerHTML=buildMsgs();bindMsgEv();return;}

  const isS=tabIdx===0,list=isS?state.shop:state.todo;
  const sort=isS?shopSort:todoSort,filter=isS?shopFilter:todoFilter,urg=isS?shopUrg:todoUrg;
  const filtered=filter==='All'?list:list.filter(i=>i.addedBy===filter);
  const pending=sortList(filtered.filter(i=>!i.done),sort),done=sortList(filtered.filter(i=>i.done),sort);

  const pills=['All',...MEMBERS.map(x=>x.name)].map(n=>{
    const mx=n==='All'?null:getMem(n),active=filter===n,col=mx?mx.color:acc;
    return`<button class="f-btn" onclick="setFilter('${n}')" style="border-color:${active?col:'var(--brd)'};background:${active?col+'1a':'transparent'};color:${active?col:'var(--muted)'}">
      ${mx?`<div class="avatar" style="width:13px;height:13px;font-size:6px;color:${mx.color};background:${mx.color}1a;border:1px solid ${mx.color}44">${mx.initials}</div>`:''}
      ${esc(n)}</button>`;
  }).join('');

  const urgBtns=URGENCY.map((u,i)=>`
    <button class="urg-btn" onclick="setUrg(${i})" style="border-color:${urg===i?u.color:'var(--brd)'};background:${urg===i?u.color+'1a':'transparent'};color:${urg===i?u.color:'var(--muted)'}">
      <span class="udot" style="background:${urg===i?u.ring:'var(--brd)'}"></span>${u.label}
    </button>`).join('');

  const ei=isS
    ?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brd)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`
    :`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brd)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;

  const pH=pending.length===0
    ?`<div class="empty"><div class="empty-icon">${ei}</div><div class="empty-text">${list.length===0?(isS?'Nothing on the list':'No tasks yet'):'All done!'}</div>${list.length===0?'<div class="empty-sub">Add something above</div>':''}</div>`
    :pending.map(it=>rItem(it,false)).join('');
  const dH=done.length===0?'':`<div class="done-sec"><div class="done-sep"></div><div class="done-hdr"><span class="done-ttl">Completed · ${done.length}</span><button class="clear-btn" onclick="clearDone()">Clear all</button></div>${done.map(it=>rItem(it,true)).join('')}</div>`;

  c.innerHTML=`
    <div class="accent-strip" style="background:${acc}"></div>
    ${notifBar()}
    <div class="input-card">
      <div class="input-row">
        <input class="main-input" id="mi" placeholder="${isS?'Add item…':'Add task…'}" style="caret-color:${acc}" onkeydown="if(event.key==='Enter')addItem()">
        <button class="add-btn" onclick="addItem()" style="background:${acc}">Add</button>
      </div>
      <div class="urg-row"><span class="urg-lbl">Urgency</span>${urgBtns}</div>
    </div>
    <div class="filter-row">${pills}</div>
    <div class="count-line">${pending.length} remaining</div>
    <div class="list-wrap">${pH}</div>
    ${dH}
    <div class="footer"><div class="fdot"></div><span class="ftxt">Synced · Firebase</span><span class="fver">${VER}</span></div>
  `;
  document.getElementById('mi')?.focus();
  document.querySelectorAll('.swipe-wrap').forEach(bindSwipe);
}

function rItem(it,isDone){
  const m=getMem(it.addedBy),u=it.urgency!=null?URGENCY[it.urgency]:URGENCY[0];
  const ub=`<span class="iurg" onclick="cycleUrg(event,'${it.id}')" style="color:${u.color}"><span class="udot" style="background:${u.ring};margin-right:2px"></span>${u.label}</span>`;
  return`<div class="swipe-wrap" data-id="${it.id}">
    <div class="swipe-bg"><span class="swipe-bg-txt">✕</span></div>
    <div class="item${isDone?' done':''}" style="border-left-color:${isDone?u.color+'55':u.color}">
      <button class="ichk" style="border-color:${m.color}55${isDone?`;background:${m.color}20;color:${m.color}`:''}" onclick="toggleItem('${it.id}')">${isDone?'✓':''}</button>
      <div class="ibody">
        <div class="itext${isDone?' struck':''}">${esc(it.text)}</div>
        <div class="imeta">
          <span class="iname" style="color:${m.color}">${esc(it.addedBy)}</span>
          ${ub}
          <span class="itime">${isDone?`by ${esc(it.doneBy||'?')}`:timeAgo(it.ts)}</span>
        </div>
      </div>
      <button class="del-btn" onclick="delItem('${it.id}')">×</button>
    </div>
  </div>`;
}

// ── SWIPE TO DELETE ──
function bindSwipe(wrap){
  const item=wrap.querySelector('.item'),bg=wrap.querySelector('.swipe-bg');
  if(!item)return;
  let sx=0,cx=0,going=false;
  item.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;cx=0;going=true;item.style.transition='none';},{passive:true});
  item.addEventListener('touchmove',e=>{
    if(!going)return;
    const dx=e.touches[0].clientX-sx;
    if(dx<0){
      cx=Math.max(dx,-165);
      item.style.transform='translateX('+cx+'px)';
      if(bg)bg.style.opacity=Math.min(1,(-cx-10)/55)+'';
    }
  },{passive:true});
  item.addEventListener('touchend',()=>{
    if(!going)return;going=false;
    item.style.transition='transform .2s ease,opacity .2s ease';
    if(cx<-105){
      item.style.transform='translateX(-110%)';item.style.opacity='0';
      setTimeout(()=>delItem(wrap.dataset.id),200);
    } else {
      item.style.transform='none';
      if(bg){bg.style.transition='opacity .18s';bg.style.opacity='0';}
    }
    cx=0;
  });
}

// ── MESSAGES ──
function buildMsgs(){
  const acc=TABS[2].accent,me=getMem(member);
  const msgsH=state.notes.length===0
    ?`<div class="empty"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brd)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="empty-text">No messages yet</div><div class="empty-sub">Send one above</div></div>`
    :state.notes.map(n=>{
      const auth=getMem(n.author),isMe=n.author===member,rx=n.reactions||{};
      const rxH=EMOJIS.map(e=>{const who=rx[e]||[];if(!who.length)return'';const mine=who.includes(member);return`<button class="rbtn${mine?' active':''}" onclick="toggleRx('${n.id}','${e}')" style="${mine?`color:${auth.color};border-color:${auth.color}55;background:${auth.color}18`:''}">${e}<span class="rcnt">${who.length}</span></button>`;}).join('');
      return`<div class="nwrap ${isMe?'mine':'theirs'}">
        <div class="nhdr" style="flex-direction:${isMe?'row-reverse':'row'}">
          <div class="avatar" style="width:28px;height:28px;font-size:11px;color:${auth.color};background:${auth.color}1a;border:2px solid ${auth.color}55">${auth.initials}</div>
          <span class="nauthor" style="color:${auth.color}">${esc(n.author)}</span>
          <span class="ntime">${timeAgo(n.ts)}</span>
        </div>
        <div class="nbubble ${isMe?'mine':'theirs'}" style="background:${isMe?auth.color+'18':'var(--surf2)'};border-color:${isMe?auth.color+'44':'var(--brd)'}${!isMe?`;border-left-color:${auth.color}88`:''}">
          <div class="ntext">${esc(n.text)}</div>
        </div>
        <div class="rbar" id="rb${n.id}">${rxH}<button class="radd" onclick="showPicker(event,'${n.id}')">+</button></div>
        ${isMe?`<button class="ndel" onclick="delNote('${n.id}')">Delete</button>`:''}
      </div>`;
    }).join('');
  return`
    <div class="accent-strip" style="background:${acc}"></div>
    ${notifBar()}
    <div class="msg-compose" style="border-top-color:${acc}">
      <textarea class="msg-ta" id="ni" placeholder="Message the family…" rows="3" style="caret-color:${acc}"></textarea>
      <div class="msg-ft">
        <div class="msg-as">
          <div class="avatar" style="width:21px;height:21px;font-size:8.5px;color:${me.color};background:${me.color}1a;border:1.5px solid ${me.color}55;flex-shrink:0">${me.initials}</div>
          as&nbsp;<b style="color:${me.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(member)}</b>
        </div>
        <button class="post-btn" id="pb" style="background:${acc}">Send</button>
      </div>
    </div>
    <div class="msg-feed">${msgsH}</div>
    <div class="footer"><div class="fdot"></div><span class="ftxt">Synced · Firebase</span><span class="fver">${VER}</span></div>
  `;
}
function bindMsgEv(){
  const b=document.getElementById('pb'),i=document.getElementById('ni');
  if(b)b.onclick=postNote;
  if(i)i.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();postNote();}});
}

// ── EMOJI PICKER ──
function showPicker(e,nid){
  e.stopPropagation();
  document.querySelectorAll('.epicker').forEach(p=>p.remove());
  if(openPicker===nid){openPicker=null;return;}
  openPicker=nid;
  const p=document.createElement('div');p.className='epicker';
  p.innerHTML=EMOJIS.map(em=>`<button class="eopt" onclick="toggleRx('${nid}','${em}');closePicker()">${em}</button>`).join('');
  document.getElementById('rb'+nid)?.appendChild(p);
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
}
function closePicker(){document.querySelectorAll('.epicker').forEach(p=>p.remove());openPicker=null;}

// ── REACTIONS ──
function toggleRx(nid,emoji){
  closePicker();
  state.notes=state.notes.map(n=>{
    if(n.id!==nid)return n;
    const rx={...(n.reactions||{})},who=rx[emoji]?[...rx[emoji]]:[];
    const idx=who.indexOf(member);if(idx>=0)who.splice(idx,1);else who.push(member);
    if(!who.length)delete rx[emoji];else rx[emoji]=who;
    return{...n,reactions:rx};
  });
  renderContent();save();
}

// ── ACTIONS ──
function addItem(){
  const inp=document.getElementById('mi'),text=inp?.value.trim();if(!text)return;
  const isS=tabIdx===0,urg=isS?shopUrg:todoUrg;
  const it={id:genId(),text,urgency:urg,addedBy:member,done:false,ts:Date.now()};
  if(isS)state.shop=[it,...state.shop];else state.todo=[it,...state.todo];
  if(isS)shopUrg=0;else todoUrg=0;
  inp.value='';renderTabs();renderContent();save();
  queueNotif(isS?'shop':'todo', member, text);sendPushNotif(`${member} → ${isS?'Shopping':'To-Do'}`,text);
}
function setUrg(i){
  const inp=document.getElementById('mi'),saved=inp?inp.value:'';
  if(tabIdx===0)shopUrg=i;else todoUrg=i;renderContent();
  const i2=document.getElementById('mi');if(i2&&saved){i2.value=saved;i2.focus();}
}
function cycleUrg(e,id){
  e.stopPropagation();
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].map(i=>i.id!==id?i:{...i,urgency:((i.urgency??0)+1)%3});
  renderContent();save();
}
function toggleItem(id){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].map(i=>i.id===id?{...i,done:!i.done,doneBy:!i.done?member:undefined}:i);
  renderTabs();renderContent();save();
}
function delItem(id){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].filter(i=>i.id!==id);renderTabs();renderContent();save();
}
function clearDone(){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].filter(i=>!i.done);renderTabs();renderContent();save();
}
function postNote(){
  const inp=document.getElementById('ni'),text=inp?.value.trim();if(!text)return;
  state.notes=[{id:genId(),text,author:member,ts:Date.now(),reactions:{}},...state.notes];
  inp.value='';renderContent();save();
  queueNotif('msg', member, text);sendPushNotif(`💬 ${member}`,text);
}
function delNote(id){state.notes=state.notes.filter(n=>n.id!==id);renderContent();save();}
function setFilter(n){if(tabIdx===0)shopFilter=n;else todoFilter=n;renderContent();}

// ── INIT ──
async function init(){
  initTheme();showScreen('loading');
  await initSW();
  try{
    const d=await fbRead();
    state={shop:d.shop,todo:d.todo,notes:d.notes};lastTs=d.updatedAt;
    setStatus('live');
    const saved=localStorage.getItem('cfh_member');
    const savedMem=saved&&MEMBERS.find(m=>m.name===saved);
    if(savedMem){renderLogin();selectMember(saved);}
    else{renderLogin();showScreen('login');}
    startPoll();loadTgCfg();initPush();
    // If already running as installed PWA with permission, re-subscribe
    if(isStandalone()&&'Notification' in window&&Notification.permission==='granted'){
      subscribePush();
    }
  }catch(e){setStatus('error');renderLogin();showScreen('login');}
}
init();
</script>
