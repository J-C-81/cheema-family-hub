<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1b2e">
<title>Cheema Family Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0f1b2e;--surf:#172034;--surf2:#1d2a42;--brd:#2a3f60;--text:#dce8f8;--sub:#6b85a8;--muted:#3f5878;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none;overflow-x:hidden}
button,input,textarea,select{font-family:'Inter',sans-serif}
input::placeholder,textarea::placeholder{color:var(--muted)}
::-webkit-scrollbar{display:none}
.screen{display:none;min-height:100dvh}.screen.active{display:flex;flex-direction:column}

/* LOADING */
#loading{align-items:center;justify-content:center;flex-direction:column}
.spinner{width:28px;height:28px;border-radius:50%;border:2.5px solid #ffffff0f;border-top-color:#60a5fa;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
#login{align-items:center;justify-content:center;padding:32px 20px;overflow:hidden;position:relative}
.glow-1{position:fixed;top:-10%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(96,165,250,.05) 0%,transparent 70%);pointer-events:none}
.glow-2{position:fixed;bottom:-10%;right:-5%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(167,139,250,.05) 0%,transparent 70%);pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--surf);border-radius:24px;border:1px solid var(--brd);box-shadow:0 24px 60px rgba(0,0,0,.5);padding:30px 22px;width:100%;max-width:320px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.brand-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,#60a5fa,#818cf8);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.5px}
.brand-sub{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}
.card-div{height:1px;background:var(--brd);margin:0 0 20px}
.sec-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.member-btn{display:flex;flex-direction:column;align-items:center;gap:9px;background:var(--surf2);border:1px solid var(--brd);border-radius:16px;padding:18px 10px 14px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s}
.member-btn:active{transform:scale(.95)}
.member-name{font-size:12px;font-weight:600}
.avatar{border-radius:30%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;user-select:none}

/* HEADER */
header{background:rgba(15,27,46,.92);border-bottom:2px solid var(--brd);padding:13px 15px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:border-color .25s}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.h-brand{display:flex;align-items:center;gap:8px}
.h-icon{width:27px;height:27px;border-radius:8px;background:linear-gradient(145deg,#60a5fa,#818cf8);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-eyebrow{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase}
.h-title{font-size:14px;font-weight:800;letter-spacing:-.4px}
.h-right{display:flex;align-items:center;gap:7px}
.status-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surf2);border-radius:20px;border:1px solid var(--brd)}
.sdot{width:5px;height:5px;border-radius:50%;transition:background .3s}
.stxt{font-size:9px;font-weight:600;color:var(--sub)}
.m-chip{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer;transition:opacity .15s}
.m-chip:active{opacity:.7}
.chip-name{font-size:11px;font-weight:600;color:var(--sub)}

/* TABS */
.tabs-row{display:flex;align-items:flex-end}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 0 11px;border:none;background:transparent;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:-.1px;transition:color .2s,background .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-cnt{font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;transition:all .2s}
.sort-wrap{padding:0 0 11px 8px;flex-shrink:0}
.sort-sel{padding:4px 9px;border-radius:8px;background:var(--surf2);font-size:10px;font-weight:700;outline:none;cursor:pointer;border-width:1.5px;border-style:solid;appearance:none;-webkit-appearance:none}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.accent-strip{height:3px;transition:background .25s}

/* Input */
.input-card{margin:13px 13px 0;background:var(--surf);border-radius:16px;overflow:hidden;border:1px solid var(--brd)}
.input-row{display:flex;align-items:center;border-bottom:1px solid var(--brd)}
.main-input{flex:1;padding:13px 14px;border:none;background:transparent;font-size:15px;font-weight:500;outline:none;color:var(--text)}
.add-btn{margin:6px;padding:8px 16px;border-radius:10px;border:none;font-weight:700;font-size:13px;color:white;transition:transform .12s,opacity .12s;white-space:nowrap;flex-shrink:0;cursor:pointer}
.add-btn:active{transform:scale(.92);opacity:.85}
.urg-row{display:flex;align-items:center;gap:5px;padding:7px 11px 8px}
.urg-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;flex-shrink:0;margin-right:2px}
.urg-btn{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-weight:600;font-size:11px;flex-shrink:0;transition:all .15s;cursor:pointer;border-width:1.5px;border-style:solid}
.urg-btn:active{transform:scale(.92)}
.udot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Filter */
.filter-row{display:flex;align-items:center;gap:5px;padding:11px 13px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-btn{display:flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;flex-shrink:0;font-weight:600;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;border-width:1.5px;border-style:solid}
.filter-btn:active{transform:scale(.93)}
.count-line{padding:11px 15px 3px;font-size:11px;color:var(--muted);font-weight:500}

/* List / Swipe */
.list-wrap{padding:3px 13px 0}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.swipe-wrap{position:relative;margin-bottom:7px;border-radius:14px;overflow:hidden;animation:slideIn .15s ease both}
.swipe-bg{position:absolute;inset:0;background:#ef4444;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:14px}
.swipe-bg-txt{color:white;font-size:16px;font-weight:700;opacity:.9}
.item{display:flex;align-items:center;gap:11px;background:var(--surf);border-radius:14px;padding:12px 13px;border:1px solid var(--brd);border-left-width:3px;position:relative;z-index:1;will-change:transform;touch-action:pan-y}
.item.done{opacity:.35}
.ichk{width:21px;height:21px;border-radius:7px;border:1.5px solid var(--brd);background:transparent;cursor:pointer;flex-shrink:0;padding:0;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.ichk:active{transform:scale(.88)}
.itext{font-size:14px;font-weight:500;color:var(--text);word-break:break-word;line-height:1.4}
.itext.done-text{text-decoration:line-through;color:var(--sub)}
.imeta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.iname{font-size:10px;font-weight:700}
.iurg{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;cursor:pointer;padding:1px 0}
.itime{font-size:10px;color:var(--muted);font-weight:500}
.del-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;transition:color .15s;flex-shrink:0;opacity:.5}
.del-btn:active{color:#ef4444;opacity:1}

/* Done */
.done-sec{padding:0 13px}
.done-sep{height:1px;background:var(--brd);margin:10px 0 0}
.done-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px}
.done-ttl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.clear-btn{font-size:11px;font-weight:600;color:var(--sub);background:var(--surf2);border:1px solid var(--brd);cursor:pointer;padding:4px 9px;border-radius:7px;transition:opacity .15s}
.clear-btn:active{opacity:.7}

/* Empty */
.empty{text-align:center;padding:50px 0 28px}
.empty-icon{width:48px;height:48px;border-radius:14px;background:var(--surf2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty-text{font-size:14px;font-weight:600;color:var(--sub)}
.empty-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* Messages */
.msg-compose{margin:13px 13px 0;background:var(--surf);border-radius:16px;overflow:hidden;border:1px solid var(--brd);border-top-width:2px;transition:border-color .25s}
.msg-ta{width:100%;padding:13px 14px;border:none;background:transparent;font-size:14px;font-weight:500;outline:none;color:var(--text);resize:none;display:block;line-height:1.55}
.msg-ft{display:flex;align-items:center;justify-content:space-between;padding:7px 11px 10px;border-top:1px solid var(--brd)}
.msg-as{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);font-weight:500}
.post-btn{padding:7px 16px;border-radius:10px;border:none;font-weight:700;font-size:12px;color:white;cursor:pointer;transition:transform .12s,opacity .12s}
.post-btn:active{transform:scale(.92);opacity:.85}
.msg-feed{padding:13px 13px 0}
.nwrap{margin-bottom:16px;display:flex;flex-direction:column;animation:slideIn .15s ease both}
.nwrap.mine{align-items:flex-end}.nwrap.theirs{align-items:flex-start}
.nhdr{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.nauthor{font-size:12px;font-weight:800}
.ntime{font-size:10px;color:var(--muted);font-weight:500}
.nbubble{max-width:84%;padding:10px 13px;border:1px solid}
.nbubble.mine{border-radius:16px 4px 16px 16px}
.nbubble.theirs{border-radius:4px 16px 16px 16px;border-left-width:3px}
.ntext{font-size:14px;font-weight:500;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.rbar{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap;position:relative}
.rbtn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;background:var(--surf2);border:1px solid var(--brd);cursor:pointer;font-size:13px;transition:all .15s}
.rcnt{font-size:10px;font-weight:700;color:var(--sub)}
.radd{padding:3px 9px;border-radius:12px;background:var(--surf2);border:1px solid var(--brd);cursor:pointer;font-size:11px;color:var(--muted);font-weight:600;transition:all .15s}
.radd:active{transform:scale(.9)}
.epicker{display:flex;gap:3px;padding:5px;background:var(--surf);border:1px solid var(--brd);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.5);position:absolute;bottom:calc(100% + 6px);left:0;z-index:50;animation:slideIn .1s ease both}
.eopt{font-size:18px;padding:4px 5px;border-radius:8px;cursor:pointer;background:none;border:none;transition:transform .1s}
.eopt:active{transform:scale(.85)}
.ndel{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:4px;font-weight:500;padding:2px 4px}

/* Notif banner */
.nbanner{margin:12px 13px 0;background:var(--surf2);border:1px solid var(--brd);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.nbtxt{font-size:12px;color:var(--sub);font-weight:500;flex:1;line-height:1.4}
.nbact{padding:5px 11px;border-radius:8px;background:#60a5fa1a;border:1px solid #60a5fa44;color:#60a5fa;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.nbdis{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0}

/* Footer */
.footer{display:flex;align-items:center;justify-content:center;gap:5px;padding:24px 0 14px}
.fdot{width:5px;height:5px;border-radius:50%;background:#22c55e}
.ftxt{font-size:10px;color:var(--muted);font-weight:500}
</style>
</head>
<body>

<div id="loading" class="screen active"><div class="spinner"></div></div>

<div id="login" class="screen">
  <div class="glow-1"></div><div class="glow-2"></div>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="brand-name">Cheema Family</div><div class="brand-sub">Your shared family hub</div></div>
    </div>
    <div class="card-div"></div>
    <div class="sec-label">Who are you?</div>
    <div class="member-grid" id="member-grid"></div>
  </div>
</div>

<div id="app" class="screen">
  <header id="mhdr">
    <div class="h-top">
      <div class="h-brand">
        <div class="h-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div><div class="h-eyebrow">Cheema Family</div><div class="h-title">Family Hub</div></div>
      </div>
      <div class="h-right">
        <div class="status-pill"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">Live</div></div>
        <button class="m-chip" onclick="showLogin()"><div class="avatar" id="havatar"></div><span class="chip-name" id="hname"></span></button>
      </div>
    </div>
    <div class="tabs-row" id="tabs"></div>
  </header>
  <div class="content" id="content"></div>
</div>

<script>
const FB='https://cheema-79800-default-rtdb.europe-west1.firebasedatabase.app/cheema.json';
const VAPID_PUB='BHeqNiEDdtZG2JXW-xhJxz8ARfkIPkyfgfQjt5rjf5a4I0nQJZYRqkPGXs-MnDkT6nc3W2lPH9IFlhGMzR4OJ-0';

const MEMBERS=[
  {name:'Mum',initials:'M',color:'#f472b6'},
  {name:'Dad',initials:'D',color:'#60a5fa'},
  {name:'Jiv',initials:'J',color:'#a78bfa'},
  {name:'Rajan(Midget)',initials:'R',color:'#34d399'},
];
const URGENCY=[
  {label:'Low',   color:'#22c55e',ring:'#4ade80'},
  {label:'Medium',color:'#f59e0b',ring:'#fbbf24'},
  {label:'High',  color:'#ef4444',ring:'#f87171'},
];
const TABS=[
  {key:'shop', label:'Shopping',accent:'#0ea5e9'},
  {key:'todo', label:'To-Do',   accent:'#818cf8'},
  {key:'notes',label:'Messages',accent:'#f97316'},
];
const SORTS=[
  {key:'recency-desc',label:'Newest'},{key:'recency-asc',label:'Oldest'},
  {key:'alpha-asc',label:'A–Z'},{key:'alpha-desc',label:'Z–A'},
  {key:'urgency-desc',label:'Urgent↓'},{key:'urgency-asc',label:'Urgent↑'},
];
const EMOJIS=['👍','❤️','😂','😮','😢'];

let state={shop:[],todo:[],notes:[]};
let member=null,tabIdx=0;
let shopSort='recency-desc',todoSort='urgency-desc';
let shopFilter='All',todoFilter='All';
let shopUrg=0,todoUrg=0;
let lastTs=0,isSaving=false,pollTimer=null,notifAsked=false;

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function timeAgo(ts){const d=Date.now()-ts;if(d<60000)return'just now';if(d<3600000)return Math.floor(d/60000)+'m ago';if(d<86400000)return Math.floor(d/3600000)+'h ago';return Math.floor(d/86400000)+'d ago'}
function getMem(n){return MEMBERS.find(m=>m.name===n)||MEMBERS[0]}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v;return Object.values(v)}
function sortList(arr,k){
  const a=[...arr];
  if(k==='recency-desc')return a.sort((x,y)=>y.ts-x.ts);
  if(k==='recency-asc')return a.sort((x,y)=>x.ts-y.ts);
  if(k==='alpha-asc')return a.sort((x,y)=>x.text.localeCompare(y.text));
  if(k==='alpha-desc')return a.sort((x,y)=>y.text.localeCompare(x.text));
  if(k==='urgency-desc')return a.sort((x,y)=>(y.urgency||0)-(x.urgency||0));
  if(k==='urgency-asc')return a.sort((x,y)=>(x.urgency||0)-(y.urgency||0));
  return a;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Firebase
async function fbRead(){
  const r=await fetch(FB);if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  return{shop:toArr(d&&d.shop),todo:toArr(d&&d.todo),notes:toArr(d&&d.notes),updatedAt:(d&&d.updatedAt)||0};
}
async function fbWrite(data){
  const p={...data,updatedAt:Date.now()};
  const r=await fetch(FB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
  if(!r.ok)throw new Error(r.status);return p.updatedAt;
}

// Status
function setStatus(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(!dot)return;
  const c={live:'#22c55e',saving:'#f59e0b',error:'#ef4444'};
  dot.style.background=c[s]||c.live;
  txt.textContent={live:'Live',saving:'Saving',error:'Error'}[s]||'Live';
}
async function save(){
  if(isSaving)return;isSaving=true;setStatus('saving');
  try{lastTs=await fbWrite(state);setStatus('live')}catch(e){setStatus('error')}
  isSaving=false;
}
function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(isSaving)return;
    try{const d=await fbRead();if(d.updatedAt>lastTs){lastTs=d.updatedAt;state={shop:d.shop,todo:d.todo,notes:d.notes};renderContent();renderTabs()}}catch(e){}
  },5000);
}

// Push
function b64ToUint8(b64){
  const pad='='.repeat((4-b64.length%4)%4);
  const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function setupPush(){
  try{
    if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64ToUint8(VAPID_PUB)});
    }
    const key=btoa(sub.endpoint).slice(-20).replace(/[^a-zA-Z0-9]/g,'');
    await fetch(`https://cheema-79800-default-rtdb.europe-west1.firebasedatabase.app/subscriptions/${key}.json`,
      {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(sub.toJSON())});
  }catch(e){console.log('Push:',e.message)}
}
async function askNotif(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){setupPush();return;}
  if(Notification.permission==='denied')return;
  const p=await Notification.requestPermission();
  if(p==='granted')setupPush();
  renderContent();
}
async function sendPush(title,body,tag){
  try{await fetch('/.netlify/functions/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payload:{title,body,tag}})})}catch(e){}
}

// Screens
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showLogin(){member=null;renderLogin();showScreen('login')}

// Login
function renderLogin(){
  const g=document.getElementById('member-grid');
  g.innerHTML=MEMBERS.map(m=>`<button class="member-btn" id="mb${m.initials}" onclick="selectMember('${esc(m.name)}')"><div class="avatar" style="width:46px;height:46px;background:${m.color}1a;border:1.5px solid ${m.color}55;font-size:18px;color:${m.color}">${m.initials}</div><span class="member-name" style="color:${m.color}">${esc(m.name)}</span></button>`).join('');
  MEMBERS.forEach(m=>{
    const b=document.getElementById('mb'+m.initials);if(!b)return;
    const on=()=>{b.style.borderColor=m.color;b.style.background=m.color+'12'};
    const off=()=>{b.style.borderColor='';b.style.background=''};
    b.addEventListener('mouseenter',on);b.addEventListener('mouseleave',off);
    b.addEventListener('touchstart',on,{passive:true});b.addEventListener('touchend',()=>setTimeout(off,250));
  });
}
function selectMember(name){
  member=name;const m=getMem(name);
  const ha=document.getElementById('havatar'),hn=document.getElementById('hname');
  ha.style.cssText=`width:21px;height:21px;border-radius:6px;background:${m.color}20;border:1.5px solid ${m.color}55;font-size:8.5px;color:${m.color};font-weight:700`;
  ha.textContent=m.initials;hn.textContent=name;
  renderTabs();renderContent();showScreen('app');
  if('Notification' in window&&Notification.permission==='granted')setupPush();
  else if('Notification' in window&&Notification.permission!=='denied'){notifAsked=true;setTimeout(renderContent,800);}
}

// Tabs
function renderTabs(){
  const acc=TABS[tabIdx].accent;
  document.getElementById('mhdr').style.borderBottomColor=acc;
  const wrap=document.getElementById('tabs');
  const sc=state.shop.filter(x=>!x.done).length,tc=state.todo.filter(x=>!x.done).length;
  const sort=tabIdx===0?shopSort:todoSort;
  let html=TABS.map((t,i)=>{
    const active=tabIdx===i,cnt=i===0?sc:i===1?tc:0;
    return`<button class="tab-btn" onclick="setTab(${i})" style="color:${active?t.accent:'#3f5878'};border-bottom-color:${active?t.accent:'transparent'};${active?`background:${t.accent}0f`:''}">${esc(t.label)}${cnt>0?`<span class="tab-cnt" style="background:${active?t.accent+'22':'#1d2a42'};color:${active?t.accent:'#3f5878'};border:1px solid ${active?t.accent+'44':'#2a3f60'}">${cnt}</span>`:''}</button>`;
  }).join('');
  if(tabIdx<2)html+=`<div class="sort-wrap"><select class="sort-sel" style="color:${acc};border-color:${acc}44" onchange="setSort(this.value)">${SORTS.map(o=>`<option value="${o.key}"${sort===o.key?' selected':''}>${o.label}</option>`).join('')}</select></div>`;
  wrap.innerHTML=html;
}
function setTab(i){tabIdx=i;renderTabs();renderContent()}
function setSort(v){if(tabIdx===0)shopSort=v;else todoSort=v;renderContent()}

// Content
function renderContent(){
  const c=document.getElementById('content'),acc=TABS[tabIdx].accent;
  if(tabIdx===2){c.innerHTML=renderMsgs();bindMsgEv();return}

  const isS=tabIdx===0,list=isS?state.shop:state.todo;
  const sort=isS?shopSort:todoSort,filter=isS?shopFilter:todoFilter,urg=isS?shopUrg:todoUrg;
  const filtered=filter==='All'?list:list.filter(i=>i.addedBy===filter);
  const pending=sortList(filtered.filter(i=>!i.done),sort),done=sortList(filtered.filter(i=>i.done),sort);

  const pills=['All',...MEMBERS.map(m=>m.name)].map(n=>{
    const m=n==='All'?null:getMem(n),active=filter===n,col=m?m.color:acc;
    return`<button class="filter-btn" onclick="setFilter('${n}')" style="border-color:${active?col:'#2a3f60'};background:${active?col+'1a':'transparent'};color:${active?col:'#3f5878'}">${m?`<div class="avatar" style="width:13px;height:13px;font-size:6px;color:${m.color};background:${m.color}1a;border:1px solid ${m.color}44">${m.initials}</div>`:''} ${esc(n)}</button>`;
  }).join('');

  const urgBtns=URGENCY.map((u,i)=>`<button class="urg-btn" onclick="setUrg(${i})" style="border-color:${urg===i?u.color:'#2a3f60'};background:${urg===i?u.color+'1a':'transparent'};color:${urg===i?u.color:'#3f5878'}"><span class="udot" style="background:${urg===i?u.ring:'#2a3f60'}"></span>${u.label}</button>`).join('');

  const ei=isS?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2a3f60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2a3f60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;

  const pH=pending.length===0?`<div class="empty"><div class="empty-icon">${ei}</div><div class="empty-text">${list.length===0?(isS?'Nothing on the list':'No tasks yet'):'All done!'}</div>${list.length===0?'<div class="empty-sub">Add something above</div>':''}</div>`:pending.map(it=>rItem(it,false)).join('');
  const dH=done.length===0?'':`<div class="done-sec"><div class="done-sep"></div><div class="done-hdr"><span class="done-ttl">Completed · ${done.length}</span><button class="clear-btn" onclick="clearDone()">Clear all</button></div>${done.map(it=>rItem(it,true)).join('')}</div>`;
  const nb=notifAsked&&typeof Notification!=='undefined'&&Notification.permission==='default'?`<div class="nbanner"><span class="nbtxt">Get notified when the family adds something</span><button class="nbact" onclick="askNotif()">Enable</button><button class="nbdis" onclick="notifAsked=false;renderContent()">✕</button></div>`:'';

  c.innerHTML=`<div class="accent-strip" style="background:${acc}"></div>${nb}<div class="input-card"><div class="input-row"><input class="main-input" id="mi" placeholder="${isS?'Add item…':'Add task…'}" style="caret-color:${acc}" onkeydown="if(event.key==='Enter')addItem()"><button class="add-btn" onclick="addItem()" style="background:${acc}">Add</button></div><div class="urg-row"><span class="urg-label">Urgency</span>${urgBtns}</div></div><div class="filter-row">${pills}</div><div class="count-line">${pending.length} remaining</div><div class="list-wrap">${pH}</div>${dH}<div class="footer"><div class="fdot"></div><span class="ftxt">Synced with Firebase</span></div>`;
  document.getElementById('mi')?.focus();
  document.querySelectorAll('.swipe-wrap').forEach(bindSwipe);
}

function rItem(it,isDone){
  const m=getMem(it.addedBy),u=it.urgency!=null?URGENCY[it.urgency]:URGENCY[0];
  const ub=`<span class="iurg" onclick="cycleUrg(event,'${it.id}')" style="color:${u.color}"><span class="udot" style="background:${u.ring}"></span>${u.label}</span>`;
  if(isDone)return`<div class="swipe-wrap" data-id="${it.id}"><div class="swipe-bg"><span class="swipe-bg-txt">✕</span></div><div class="item done" style="border-left-color:${u.color}44"><button class="ichk" style="color:${m.color};border-color:${m.color}44;background:${m.color}18" onclick="toggleItem('${it.id}')">✓</button><div style="flex:1;min-width:0"><div class="itext done-text">${esc(it.text)}</div><div class="imeta"><span class="iname" style="color:${m.color}">${esc(it.addedBy)}</span>${ub}</div></div><button class="del-btn" onclick="delItem('${it.id}')">×</button></div></div>`;
  return`<div class="swipe-wrap" data-id="${it.id}"><div class="swipe-bg"><span class="swipe-bg-txt">✕</span></div><div class="item" style="border-left-color:${u.color}"><button class="ichk" style="border-color:${m.color}44" onclick="toggleItem('${it.id}')"></button><div style="flex:1;min-width:0"><div class="itext">${esc(it.text)}</div><div class="imeta"><span class="iname" style="color:${m.color}">${esc(it.addedBy)}</span>${ub}<span class="itime">${timeAgo(it.ts)}</span></div></div><button class="del-btn" onclick="delItem('${it.id}')">×</button></div></div>`;
}

// Swipe to delete
function bindSwipe(wrap){
  const item=wrap.querySelector('.item');if(!item)return;
  let sx=0,cx=0,dragging=false;
  item.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;cx=0;dragging=true;item.style.transition='none';},{passive:true});
  item.addEventListener('touchmove',e=>{if(!dragging)return;const dx=e.touches[0].clientX-sx;if(dx<0){cx=Math.max(dx,-160);item.style.transform=`translateX(${cx}px)`;}},{passive:true});
  item.addEventListener('touchend',()=>{
    if(!dragging)return;dragging=false;
    item.style.transition='transform .18s ease,opacity .18s';
    if(cx<-110){item.style.transform='translateX(-100%)';item.style.opacity='0';setTimeout(()=>delItem(wrap.dataset.id),180);}
    else item.style.transform='translateX(0)';
    cx=0;
  });
}

// Messages
function renderMsgs(){
  const acc=TABS[2].accent,me=getMem(member);
  const nb2=notifAsked&&typeof Notification!=='undefined'&&Notification.permission==='default'?`<div class="nbanner" style="margin-top:13px"><span class="nbtxt">Get notified when someone messages</span><button class="nbact" onclick="askNotif()">Enable</button><button class="nbdis" onclick="notifAsked=false;renderContent()">✕</button></div>`:'';
  const msgsH=state.notes.length===0?`<div class="empty"><div class="empty-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2a3f60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="empty-text">No messages yet</div><div class="empty-sub">Send one above</div></div>`:state.notes.map(n=>{
    const auth=getMem(n.author),isMe=n.author===member,rx=n.reactions||{};
    const rxH=EMOJIS.map(e=>{const who=rx[e]||[];if(!who.length)return'';const mine=who.includes(member);return`<button class="rbtn${mine?' active':''}" onclick="toggleRx('${n.id}','${e}')" style="${mine?`color:${auth.color};border-color:${auth.color}55;background:${auth.color}18`:''}">${e}<span class="rcnt">${who.length}</span></button>`;}).join('');
    return`<div class="nwrap ${isMe?'mine':'theirs'}"><div class="nhdr" style="flex-direction:${isMe?'row-reverse':'row'}"><div class="avatar" style="width:28px;height:28px;font-size:11px;color:${auth.color};background:${auth.color}1a;border:2px solid ${auth.color}55">${auth.initials}</div><span class="nauthor" style="color:${auth.color}">${esc(n.author)}</span><span class="ntime">${timeAgo(n.ts)}</span></div><div class="nbubble ${isMe?'mine':'theirs'}" style="background:${isMe?auth.color+'18':'#1d2a42'};border-color:${isMe?auth.color+'44':'#2a3f60'}${!isMe?`;border-left-color:${auth.color}77`:''}"><div class="ntext">${esc(n.text)}</div></div><div class="rbar" id="rb${n.id}">${rxH}<button class="radd" onclick="showPicker(event,'${n.id}')">+</button></div>${isMe?`<button class="ndel" onclick="delNote('${n.id}')">Delete</button>`:''}</div>`;
  }).join('');
  return`${nb2}<div class="msg-compose" style="border-top-color:${acc}"><textarea class="msg-ta" id="ni" placeholder="Message the family…" rows="3" style="caret-color:${acc}"></textarea><div class="msg-ft"><div class="msg-as"><div class="avatar" style="width:20px;height:20px;font-size:8px;color:${me.color};background:${me.color}1a;border:1.5px solid ${me.color}44">${me.initials}</div>as <b style="color:${me.color}">${esc(member)}</b></div><button class="post-btn" id="pb" style="background:${acc}">Send</button></div></div><div class="msg-feed">${msgsH}</div><div class="footer"><div class="fdot"></div><span class="ftxt">Synced with Firebase</span></div>`;
}
function bindMsgEv(){
  const b=document.getElementById('pb'),i=document.getElementById('ni');
  if(b)b.onclick=postNote;
  if(i)i.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();postNote()}});
}

// Emoji picker
let openPicker=null;
function showPicker(e,nid){
  e.stopPropagation();
  document.querySelectorAll('.epicker').forEach(p=>p.remove());
  if(openPicker===nid){openPicker=null;return;}
  openPicker=nid;
  const p=document.createElement('div');p.className='epicker';
  p.innerHTML=EMOJIS.map(em=>`<button class="eopt" onclick="toggleRx('${nid}','${em}');closePicker()">${em}</button>`).join('');
  document.getElementById('rb'+nid)?.appendChild(p);
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),10);
}
function closePicker(){document.querySelectorAll('.epicker').forEach(p=>p.remove());openPicker=null;}

// Reactions
function toggleRx(nid,emoji){
  closePicker();
  state.notes=state.notes.map(n=>{
    if(n.id!==nid)return n;
    const rx={...(n.reactions||{})};
    const who=rx[emoji]?[...rx[emoji]]:[];
    const idx=who.indexOf(member);
    if(idx>=0)who.splice(idx,1);else who.push(member);
    if(!who.length)delete rx[emoji];else rx[emoji]=who;
    return{...n,reactions:rx};
  });
  renderContent();save();
}

// Actions
function addItem(){
  const inp=document.getElementById('mi');
  const text=inp?.value.trim();if(!text)return;
  const isS=tabIdx===0,urg=isS?shopUrg:todoUrg;
  const it={id:genId(),text,urgency:urg,addedBy:member,done:false,ts:Date.now()};
  if(isS)state.shop=[it,...state.shop];else state.todo=[it,...state.todo];
  if(isS)shopUrg=0;else todoUrg=0;
  inp.value='';renderTabs();renderContent();save();
  sendPush(`${member} added to ${isS?'Shopping':'To-Do'}`,text,'add');
}
function setUrg(i){
  const inp=document.getElementById('mi'),saved=inp?inp.value:'';
  if(tabIdx===0)shopUrg=i;else todoUrg=i;
  renderContent();
  const inp2=document.getElementById('mi');
  if(inp2&&saved){inp2.value=saved;inp2.focus();}
}
function cycleUrg(e,id){
  e.stopPropagation();
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].map(i=>i.id!==id?i:{...i,urgency:((i.urgency??0)+1)%3});
  renderContent();save();
}
function toggleItem(id){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].map(i=>i.id===id?{...i,done:!i.done,doneBy:!i.done?member:undefined}:i);
  renderTabs();renderContent();save();
}
function delItem(id){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].filter(i=>i.id!==id);renderTabs();renderContent();save();
}
function clearDone(){
  const k=tabIdx===0?'shop':'todo';
  state[k]=state[k].filter(i=>!i.done);renderTabs();renderContent();save();
}
function postNote(){
  const inp=document.getElementById('ni'),text=inp?.value.trim();if(!text)return;
  state.notes=[{id:genId(),text,author:member,ts:Date.now(),reactions:{}},...state.notes];
  inp.value='';renderContent();save();
  sendPush(member,text,'msg');
}
function delNote(id){state.notes=state.notes.filter(n=>n.id!==id);renderContent();save();}
function setFilter(n){if(tabIdx===0)shopFilter=n;else todoFilter=n;renderContent()}

// Init
async function init(){
  showScreen('loading');
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e.message));
  try{
    const d=await fbRead();
    state={shop:d.shop,todo:d.todo,notes:d.notes};lastTs=d.updatedAt;
    setStatus('live');renderLogin();showScreen('login');startPoll();
  }catch(e){setStatus('error');renderLogin();showScreen('login');}
}
init();
</script>
</body>
